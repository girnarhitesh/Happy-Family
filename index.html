<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Family Surprise!</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

        body {
            margin: 0; padding: 0;
            background-color: #ffeef2;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        .teddy img {
            width: 120px;
            border-radius: 15px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 { color: #ff4d6d; font-size: 1.8rem; margin: 10px 0; }

        button {
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
            font-weight: 600;
        }

        button:hover { background-color: #ff758f; transform: scale(1.05); }

        /* Hidden Sections */
        #birthdayMessage, #gallerySection, #swiperWrapper {
            display: none; 
            animation: fadeIn 1s ease-in;
        }

        #birthdayMessage {
            font-size: 15px;
            color: #333;
            margin-top: 20px;
            line-height: 1.6;
        }

        /* Swiper Styling */
        .swiper {
            width: 260px;
            height: 320px;
            margin-top: 20px;
        }

        .swiper-slide {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            border: 5px solid #fff;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 14px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sparkle {
            position: absolute;
            pointer-events: none;
            font-size: 20px;
            animation: sparkleAnim 1s linear forwards;
            z-index: 9999;
        }

        @keyframes sparkleAnim {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1.2) translateY(50px); opacity: 0; }
        }

        .balloon {
            position: absolute;
            bottom: -100px;
            font-size: 30px;
            animation: float 6s linear infinite;
            opacity: 0.6;
        }

        @keyframes float {
            0% { transform: translateY(0); }
            100% { transform: translateY(-110vh); }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="teddy">
            <img src="photo.img/images-removebg-preview.png" alt="Family">
        </div>
        <h1>Happy Family</h1>

        <button id="wishBtn" onclick="showWish()">Click for a Surprise! ✨</button>

        <div id="birthdayMessage">
            "To the heart of our happy family, <br>
            May your day be filled with endless joy and shared success. <br>
            May we always keep smiling together and shining bright. <br>
            May all the dreams you hold dear come true this year!" ❤️
            <br>
            <button id="showGalleryBtn" onclick="showGalleryButton()">Next 📸</button>
        </div>

        <div id="gallerySection">
            <button id="folderBtn" onclick="startAutomaticGallery()">Open Surprise Gallery 🎁</button>
            
            <div id="swiperWrapper">
                <div class="swiper mySwiper">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide"><img src="photo.img/1.jpeg"></div>
                        <div class="swiper-slide"><img src="photo.img/2.jpeg"></div>
                        <div class="swiper-slide"><img src="photo.img/3.jpeg"></div>
                        <div class="swiper-slide"><img src="photo.img/4.jpeg"></div>
                        <div class="swiper-slide"><img src="photo.img/5.jpeg"></div>
                        <div class="swiper-slide"><img src="photo.img/6.jpeg"></div>
                        <div class="swiper-slide"><img src="photo.img/7.jpeg"></div>
                        <div class="swiper-slide" style="background:#ff4d6d; color:white; font-weight:bold;">ENJOY Family! 🎈</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // Logic to show parts step-by-step
        function showWish() {
            document.getElementById('wishBtn').style.display = 'none';
            document.getElementById('birthdayMessage').style.display = 'block';
        }

        function showGalleryButton() {
            document.getElementById('showGalleryBtn').style.display = 'none';
            document.getElementById('gallerySection').style.display = 'block';
        }

        function startAutomaticGallery() {
            document.getElementById('folderBtn').style.display = 'none';
            document.getElementById('swiperWrapper').style.display = 'block';

            // Initialize Swiper with Autoplay
            new Swiper(".mySwiper", {
                effect: "cards",
                grabCursor: true,
                perSlideOffset: 8,
                perSlideRotate: 2,
                rotate: true,
                loop: true,
                autoplay: {
                    delay: 2000, // 2 seconds mein change hoga
                    disableOnInteraction: false,
                },
            });
        }

        // Mouse Trail
        document.addEventListener('mousemove', function (e) {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            const icons = ["✨", "❤️", "🎈", "🍰"];
            sparkle.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            sparkle.style.left = e.clientX + 'px';
            sparkle.style.top = e.clientY + 'px';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 1000);
        });

        // Floating Balloons
        function createBalloon() {
            const balloon = document.createElement('div');
            balloon.classList.add('balloon');
            const icons = ["🎈", "❤️", "💖"];
            balloon.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            balloon.style.left = Math.random() * 100 + "vw";
            balloon.style.animationDuration = (Math.random() * 3 + 4) + "s";
            document.body.appendChild(balloon);
            setTimeout(() => balloon.remove(), 6000);
        }
        setInterval(createBalloon, 500);
    </script>
</body>
</html>
